<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>나만의 기록 - 일기</title>
    <!-- 구글 폰트: 고운 바탕 및 날짜용 폰트 -->
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Courier+Prime&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --white: #ffffff;
            --black: #000000;
            --text-gray: #2d3436;
            --line-color: #f0f0f0;
            --accent-gray: #888;
            --date-orange: #ff8c00;
            --holiday-red: #eb4d4b;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--white);
            font-family: 'Gowun Batang', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
            padding-bottom: calc(110px + env(safe-area-inset-bottom));
            color: var(--black);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        /* 모달 스타일 (아이폰 최적화) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 4000;
        }

        .modal-box {
            background: transparent;
            padding: 20px;
            text-align: center;
            max-width: 440px;
            width: 95%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .modal-title {
            /* 텍스트 끊김 방지: clamp와 nowrap으로 한 줄 강제 */
            font-size: clamp(1rem, 4.5vw, 1.25rem); 
            letter-spacing: -0.01em;
            margin: 0;
            font-weight: 700;
            white-space: nowrap; 
            overflow: hidden;
            width: 100%;
            display: block;
        }

        .modal-input {
            font-family: 'Gowun Batang', serif;
            font-size: 1.3rem;
            border: none;
            border-bottom: 1.5px solid var(--black);
            padding: 12px;
            text-align: center;
            outline: none;
            background: transparent;
            width: 100%;
            border-radius: 0;
        }

        .modal-btn {
            background: var(--black);
            color: var(--white);
            border: none;
            padding: 18px;
            font-family: 'Gowun Batang', serif;
            cursor: pointer;
            letter-spacing: 0.1em;
            font-size: 1rem;
            border-radius: 16px;
            font-weight: 700;
        }

        /* 달력 뷰 */
        #calendar-view {
            width: 100%;
            max-width: 500px;
            padding: 80px 15px 40px;
            text-align: center;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .calendar-title { font-size: 1.5rem; letter-spacing: 0.1em; font-weight: 700; }
        .nav-btn { background: rgba(0,0,0,0.03); border: none; font-size: 1rem; cursor: pointer; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .day-label { font-weight: 700; font-size: 0.75rem; padding-bottom: 10px; color: var(--accent-gray); }

        .calendar-day {
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 0.95rem;
            border-radius: 10px;
            position: relative;
        }
        .calendar-day.today { background-color: var(--black); color: var(--white); font-weight: 700; }
        .calendar-day.holiday { color: var(--holiday-red); }

        /* 일기장 본체 (여백 최적화) */
        #diary-artifact {
            background-color: var(--white);
            width: 100%;
            max-width: 500px;
            padding: 30px 8px 10px; 
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header-section { display: flex; flex-direction: column; margin-bottom: 10px; padding: 0 10px; }
        .title-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
        .back-to-cal { font-size: 0.8rem; color: var(--accent-gray); cursor: pointer; padding: 5px 0; }
        .main-title-display { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.05em; }

        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            border-bottom: 1px solid #000;
            padding-bottom: 6px;
        }

        .filter-selector { display: flex; justify-content: center; gap: 10px; margin-top: 10px; font-size: 0.8rem; }
        .filter-opt { cursor: pointer; color: var(--accent-gray); padding: 5px 12px; border-radius: 20px; background: transparent; }
        .filter-opt.active { color: var(--black); font-weight: 700; background: #f2f2f7; }

        /* 사진 영역 (인스타그램 피드 스타일 1:1) */
        .photo-container { width: 100%; margin-top: 5px; display: flex; justify-content: center; }

        .polaroid-frame {
            background: white;
            padding: 8px 8px 35px 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #f2f2f2;
            width: 100%; 
            position: relative;
        }

        .image-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1; 
            overflow: hidden;
            position: relative;
            background-color: #080808;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video, .captured-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }
        video { transform: scaleX(-1); }

        /* 화면 표시용 필터 정의 */
        .fuji-filter { filter: contrast(1.4) brightness(1.1) saturate(1.3) sepia(0.05); }
        .bw-filter { filter: grayscale(100%) contrast(1.8) brightness(1.05); }

        .flash-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 80%);
            mix-blend-mode: screen; pointer-events: none; z-index: 5;
        }

        .vignette-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, transparent 35%, rgba(0,0,0,0.5) 100%);
            mix-blend-mode: multiply; pointer-events: none; z-index: 6;
        }

        .date-stamp {
            position: absolute; bottom: 8px; right: 12px; color: var(--date-orange);
            font-family: 'Courier Prime', monospace; font-size: 1.05rem; font-weight: 700;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.3); opacity: 0.95; z-index: 10;
        }

        .grain-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; opacity: 0.35; pointer-events: none;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMjkiIGhlaWdodD0iMTI5Ij48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC45NSIgbnVtT2N0YXZlcz0iNSIgc3RpdGNoVGlsZWS9InN0aXRjaCIvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNuKSIvPjwvc3ZnPg==');
            z-index: 7;
        }

        .divider-line { width: calc(100% - 20px); height: 1px; background-color: var(--black); margin: 20px 10px; }

        .diary-textarea {
            width: 100%; border: none; background: transparent; font-family: 'Gowun Batang', serif;
            font-size: 0.9rem; line-height: 1.8rem; color: var(--text-gray); resize: none; outline: none;
            min-height: 140px; padding: 0 10px; display: block;
            background-image: linear-gradient(transparent, transparent calc(1.8rem - 1px), var(--line-color) calc(1.8rem - 1px));
            background-size: 100% 1.8rem; background-attachment: local;
            overflow: hidden;
        }

        /* 하단 고정 바 */
        .fixed-bottom-bar {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 12px 20px calc(15px + env(safe-area-inset-bottom));
            display: flex;
            gap: 10px;
            z-index: 100;
            box-shadow: 0 -0.5px 0 rgba(0,0,0,0.1);
        }

        .control-btn {
            flex: 1;
            padding: 16px;
            font-family: 'Gowun Batang', serif;
            border-radius: 16px;
            font-size: 0.95rem;
            cursor: pointer;
            text-align: center;
            border: 1px solid #e5e5e5;
            background: var(--white);
            font-weight: 700;
        }
        .control-btn.primary { background: var(--black); color: var(--white); border: none; }

        /* 수동 촬영 셔터 버튼 시스템 */
        #shutter-btn-container {
            position: fixed;
            bottom: calc(40px + env(safe-area-inset-bottom));
            left: 0; width: 100%;
            display: flex; justify-content: center;
            z-index: 200;
            pointer-events: none;
        }

        .shutter-btn {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: white;
            border: 6px solid rgba(0,0,0,0.05);
            box-shadow: 0 0 40px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto;
        }
        .shutter-btn::after {
            content: ''; width: 62px; height: 62px;
            border-radius: 50%; border: 2px solid #000;
        }
        .shutter-btn:active { transform: scale(0.9); }

        /* 바텀 시트 */
        .bottom-sheet-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 4500;
            opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .bottom-sheet-overlay.active { opacity: 1; visibility: visible; }

        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: var(--white); border-radius: 30px 30px 0 0;
            padding: 20px 20px calc(45px + env(safe-area-inset-bottom));
            z-index: 4501; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex; flex-direction: column; gap: 12px;
        }
        .bottom-sheet.active { bottom: 0; }
        .sheet-option { padding: 20px; text-align: center; font-size: 1.1rem; border-radius: 18px; background: #f2f2f7; color: var(--black); font-weight: 700; }
        .sheet-option.cancel { background: transparent; color: var(--accent-gray); font-weight: 400; }

        .shutter-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 5000; }
        @keyframes shutter { 0% { opacity: 0.95; } 100% { opacity: 0; } }
        
        .exporting .back-to-cal, .exporting .filter-selector { display: none !important; }
    </style>
</head>
<body>

    <!-- 1. 이름 설정 모달 -->
    <div id="name-modal" class="modal-overlay">
        <div class="modal-box">
            <h2 class="modal-title">일기장의 이름을 정해주세요</h2>
            <input type="text" id="modal-title-input" class="modal-input" placeholder="이름을 입력하세요" maxlength="15" autocorrect="off">
            <button id="modal-confirm-btn" class="modal-btn">기록 시작하기</button>
        </div>
    </div>

    <!-- 2. 내보내기 옵션 모달 -->
    <div id="export-modal" class="modal-overlay hidden">
        <div class="modal-box" style="gap: 12px;">
            <h2 style="font-size: 1.35rem; margin-bottom: 5px; font-weight: 700;">기록을 어떻게 저장할까요?</h2>
            <button class="modal-btn" id="export-full-btn">일기장 전체 저장</button>
            <button class="modal-btn" id="export-photo-btn">폴라로이드 사진만 저장</button>
            <button class="modal-btn secondary" id="export-cancel-btn">취소</button>
        </div>
    </div>

    <!-- 3. 달력 뷰 -->
    <div id="calendar-view" class="hidden">
        <div class="calendar-header">
            <button class="nav-btn" id="prev-month">〈</button>
            <div class="calendar-title" id="calendar-month-year">2026 . 03</div>
            <button class="nav-btn" id="next-month">〉</button>
        </div>
        <div class="calendar-grid" id="calendar-grid">
            <div class="day-label" style="color: var(--holiday-red);">일</div>
            <div class="day-label">월</div>
            <div class="day-label">화</div>
            <div class="day-label">수</div>
            <div class="day-label">목</div>
            <div class="day-label">금</div>
            <div class="day-label" style="color: #1976d2;">토</div>
        </div>
    </div>

    <!-- 4. 일기장 본체 -->
    <div id="diary-artifact" class="hidden">
        <div class="header-section" id="header-area">
            <div class="title-row">
                <span class="back-to-cal" id="go-back-cal">〈 달력으로</span>
                <div class="main-title-display" id="display-title">영원</div>
            </div>
            <div class="meta-row">
                <div><span id="selected-date-text" style="font-weight: 700;">2026.03.04</span></div>
                <div>
                    <span style="font-size: 0.8rem; color: var(--accent-gray);">날씨</span>
                    <input type="text" id="weather-input" style="border:none; background:transparent; font-family:inherit; outline:none; width: 60px; text-align: right; font-weight: 700;" value="맑음">
                </div>
            </div>
            <div class="filter-selector">
                <span class="filter-opt active" data-filter="color">컬러 필름</span>
                <span class="filter-opt" data-filter="bw">흑백 필름</span>
            </div>
        </div>

        <div class="photo-container" id="photo-area">
            <div class="polaroid-frame" id="polaroid-target">
                <div class="image-wrapper" id="image-wrapper">
                    <video id="camera-preview" class="fuji-filter" autoplay playsinline></video>
                    <div class="flash-overlay"></div>
                    <div class="vignette-overlay"></div>
                    <div class="grain-overlay"></div>
                    <div class="date-stamp" id="photo-date-stamp">2026/03/04</div>
                </div>
            </div>
        </div>

        <div class="divider-line" id="divider-area"></div>
        <textarea class="diary-textarea" id="diary-text" placeholder="오늘 당신의 순간을 기록하세요." spellcheck="false"></textarea>
    </div>

    <!-- 하단 컨트롤 바 -->
    <div class="fixed-bottom-bar hidden" id="diary-controls">
        <button class="control-btn" id="reset-btn">다시하기</button>
        <button class="control-btn primary" id="record-menu-btn">기록하기</button>
        <button class="control-btn" id="save-btn">내보내기</button>
    </div>

    <!-- 촬영용 전용 셔터 버튼 -->
    <div id="shutter-btn-container" class="hidden">
        <div class="shutter-btn" id="real-shutter"></div>
    </div>

    <!-- 기록 옵션 바텀 시트 -->
    <div class="bottom-sheet-overlay" id="sheet-overlay"></div>
    <div class="bottom-sheet" id="record-sheet">
        <div class="sheet-option" id="capture-option">📷 사진 촬영하기</div>
        <div class="sheet-option" id="upload-option">🖼️ 갤러리 불러오기</div>
        <div class="sheet-option cancel" id="cancel-sheet">취소</div>
    </div>

    <input type="file" id="file-input" accept="image/*" style="display: none;">
    <div class="shutter-flash" id="flash"></div>

    <script>
        const nameModal = document.getElementById('name-modal');
        const exportModal = document.getElementById('export-modal');
        const calendarView = document.getElementById('calendar-view');
        const diaryView = document.getElementById('diary-artifact');
        const diaryControls = document.getElementById('diary-controls');
        const shutterContainer = document.getElementById('shutter-btn-container');
        const realShutter = document.getElementById('real-shutter');
        const modalInput = document.getElementById('modal-title-input');
        const confirmBtn = document.getElementById('modal-confirm-btn');
        const displayTitle = document.getElementById('display-title');
        const calendarGrid = document.getElementById('calendar-grid');
        const calMonthYear = document.getElementById('calendar-month-year');
        const prevMonthBtn = document.getElementById('prev-month');
        const nextMonthBtn = document.getElementById('next-month');
        const selectedDateText = document.getElementById('selected-date-text');
        const photoDateStamp = document.getElementById('photo-date-stamp');
        const backToCalBtn = document.getElementById('go-back-cal');
        const video = document.getElementById('camera-preview');
        const recordMenuBtn = document.getElementById('record-menu-btn');
        const resetBtn = document.getElementById('reset-btn');
        const saveBtn = document.getElementById('save-btn');
        const filterOpts = document.querySelectorAll('.filter-opt');
        const flash = document.getElementById('flash');
        const diaryTextarea = document.getElementById('diary-text');
        const imageWrapper = document.getElementById('image-wrapper');
        const sheetOverlay = document.getElementById('sheet-overlay');
        const recordSheet = document.getElementById('record-sheet');
        const fileInput = document.getElementById('file-input');

        let diaryTitle = "영원";
        let currentYear, currentMonth;
        let selectedDate = new Date();
        let isCaptured = false;
        let currentFilter = 'color';
        let stream = null;

        const holidays = {
            "2024-01-01": "신정", "2024-02-09": "설날", "2024-03-01": "삼일절", "2025-01-01": "신정", "2025-03-01": "삼일절", "2025-05-05": "어린이날", "2026-03-01": "삼일절", "2026-05-05": "어린이날", "2026-06-06": "현충일", "2026-08-15": "광복절", "2026-10-03": "개천절", "2026-10-09": "한글날", "2026-12-25": "성탄절"
        };

        confirmBtn.onclick = () => {
            if (modalInput.value.trim()) diaryTitle = modalInput.value;
            displayTitle.innerText = diaryTitle;
            nameModal.classList.add('hidden');
            calendarView.classList.remove('hidden');
            const today = new Date();
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            renderCalendar(currentYear, currentMonth);
        };

        function renderCalendar(year, month) {
            calMonthYear.innerText = `${year} . ${String(month + 1).padStart(2, '0')}`;
            const labels = Array.from(calendarGrid.querySelectorAll('.day-label'));
            calendarGrid.innerHTML = '';
            labels.forEach(l => calendarGrid.appendChild(l));
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            for (let d = 1; d <= lastDate; d++) {
                if (d === 1) { for (let i = 0; i < firstDay; i++) { const e = document.createElement('div'); e.className = 'calendar-day empty'; calendarGrid.appendChild(e); } }
                const dEl = document.createElement('div');
                dEl.className = 'calendar-day';
                dEl.innerText = d;
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                if (year === today.getFullYear() && month === today.getMonth() && d === today.getDate()) dEl.classList.add('today');
                if (new Date(year, month, d).getDay() === 0 || holidays[dateKey]) dEl.classList.add('holiday');
                dEl.onclick = () => {
                    selectedDate = new Date(year, month, d);
                    selectedDateText.innerText = `${year}.${String(month+1).padStart(2,'0')}.${String(d).padStart(2,'0')}`;
                    photoDateStamp.innerText = `${year}/${String(month+1).padStart(2,'0')}/${String(d).padStart(2,'0')}`;
                    calendarView.classList.add('hidden'); diaryView.classList.remove('hidden'); diaryControls.classList.remove('hidden');
                    startCamera();
                };
                calendarGrid.appendChild(dEl);
            }
        }

        prevMonthBtn.onclick = () => { currentMonth--; if(currentMonth < 0){ currentMonth = 11; currentYear--; } renderCalendar(currentYear, currentMonth); };
        nextMonthBtn.onclick = () => { currentMonth++; if(currentMonth > 11){ currentMonth = 0; currentYear++; } renderCalendar(currentYear, currentMonth); };

        async function startCamera() {
            try { 
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1080 }, height: { ideal: 1080 } }, audio: false }); 
                video.srcObject = stream; 
            } catch (err) { console.error("Camera error:", err); }
        }

        recordMenuBtn.onclick = () => { if (!isCaptured) { sheetOverlay.classList.add('active'); recordSheet.classList.add('active'); } };
        sheetOverlay.onclick = () => { sheetOverlay.classList.remove('active'); recordSheet.classList.remove('active'); };
        document.getElementById('cancel-sheet').onclick = () => sheetOverlay.onclick();

        document.getElementById('capture-option').onclick = () => {
            sheetOverlay.classList.remove('active'); recordSheet.classList.remove('active');
            diaryControls.classList.add('hidden'); shutterContainer.classList.remove('hidden');
        };

        // 캔버스를 통해 물리적으로 필터를 입히고 1:1 크롭 이미지를 생성하는 핵심 함수
        function createFilteredImageData(source, isVideo = false) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const w = isVideo ? source.videoWidth : source.naturalWidth;
            const h = isVideo ? source.videoHeight : source.naturalHeight;
            const size = Math.min(w, h); // 짧은 쪽 기준으로 정사각형 추출
            
            canvas.width = size;
            canvas.height = size;

            // 1. Canvas Filter 적용 (저장물에 직접 반영됨)
            if (currentFilter === 'bw') {
                ctx.filter = 'grayscale(100%) contrast(1.4) brightness(1.1)';
            } else {
                ctx.filter = 'contrast(1.1) brightness(1.1) saturate(1.2)';
            }

            // 2. 중앙 크롭 및 그리기
            const sx = (w - size) / 2;
            const sy = (h - size) / 2;
            
            if (isVideo) {
                ctx.translate(canvas.width, 0); ctx.scale(-1, 1); // 좌우 반전
                ctx.drawImage(source, sx, sy, size, size, 0, 0, size, size);
            } else {
                ctx.drawImage(source, sx, sy, size, size, 0, 0, size, size);
            }
            
            // 만약 브라우저가 ctx.filter를 지원하지 않을 경우를 대비한 수동 흑백 변환 (강력 보정)
            if (currentFilter === 'bw') {
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const avg = (data[i] * 0.3 + data[i + 1] * 0.59 + data[i + 2] * 0.11);
                    data[i] = data[i+1] = data[i+2] = avg;
                }
                ctx.putImageData(imgData, 0, 0);
            }

            return canvas.toDataURL('image/png');
        }

        realShutter.onclick = () => {
            flash.style.animation = 'none'; void flash.offsetWidth; flash.style.animation = 'shutter 0.4s ease-out';
            const finalSrc = createFilteredImageData(video, true);
            renderFinalImage(finalSrc);
            shutterContainer.classList.add('hidden'); diaryControls.classList.remove('hidden');
        };

        document.getElementById('upload-option').onclick = () => fileInput.click();
        fileInput.onchange = (e) => { 
            if (e.target.files[0]) { 
                const r = new FileReader(); 
                r.onload = (ev) => {
                    const tempImg = new Image();
                    tempImg.onload = () => {
                        const finalSrc = createFilteredImageData(tempImg, false);
                        renderFinalImage(finalSrc);
                    };
                    tempImg.src = ev.target.result;
                }; 
                r.readAsDataURL(e.target.files[0]); 
            } 
        };

        function renderFinalImage(src) {
            const img = document.createElement('img'); 
            img.src = src; 
            img.className = 'captured-img'; // 필터가 이미 데이터에 입혀져 있음
            video.classList.add('hidden'); 
            imageWrapper.prepend(img); 
            isCaptured = true; 
            if(sheetOverlay.classList.contains('active')) sheetOverlay.onclick();
            recordMenuBtn.style.opacity = '0.5';
        }

        resetBtn.onclick = () => { 
            isCaptured = false; 
            const ci = document.querySelector('.captured-img'); 
            if(ci) ci.remove(); 
            video.classList.remove('hidden'); 
            recordMenuBtn.style.opacity = '1'; 
        };
        
        backToCalBtn.onclick = () => { 
            if(stream) stream.getTracks().forEach(t => t.stop()); 
            diaryView.classList.add('hidden'); 
            diaryControls.classList.add('hidden'); 
            calendarView.classList.remove('hidden'); 
            resetBtn.onclick(); 
        };

        filterOpts.forEach(opt => {
            opt.onclick = () => {
                if (isCaptured) return;
                filterOpts.forEach(o => o.classList.remove('active')); 
                opt.classList.add('active');
                currentFilter = opt.dataset.filter; 
                video.className = currentFilter === 'color' ? 'fuji-filter' : 'bw-filter';
            };
        });

        saveBtn.onclick = () => exportModal.classList.remove('hidden');
        document.getElementById('export-cancel-btn').onclick = () => exportModal.classList.add('hidden');

        function performExport(target, filename, isFull) {
            exportModal.classList.add('hidden'); 
            saveBtn.innerText = "저장중";
            
            // 현재 화면의 물리적 픽셀 너비를 정확히 구함 (왜곡 방지)
            const rect = target.getBoundingClientRect();
            const originalWidth = rect.width;
            
            if (isFull) { diaryView.classList.add('exporting'); }
            
            html2canvas(target, { 
                backgroundColor: '#ffffff', 
                scale: 3, 
                useCORS: true,
                allowTaint: true,
                width: originalWidth, 
                onclone: (clonedDoc) => {
                    const clonedTarget = clonedDoc.getElementById(target.id);
                    clonedTarget.style.width = originalWidth + "px";
                    
                    if(isFull) {
                        const ct = clonedDoc.getElementById('diary-text'); 
                        const tv = ct.value; 
                        const pr = ct.parentNode; 
                        const td = clonedDoc.createElement('div');
                        const ts = getComputedStyle(diaryTextarea);
                        td.style.cssText = `width:100%; font-family:${ts.fontFamily}; font-size:${ts.fontSize}; line-height:${ts.lineHeight}; color:${ts.color}; white-space:pre-wrap; word-break:break-all; min-height:${ts.minHeight}; background-image:${ts.backgroundImage}; background-size:${ts.backgroundSize}; padding: 0 12px; margin-top:10px;`;
                        td.innerText = tv || " "; 
                        pr.replaceChild(td, ct);
                    }
                }
            }).then(canvas => {
                const link = document.createElement('a'); 
                link.download = `${filename}.png`; 
                link.href = canvas.toDataURL('image/png'); 
                link.click();
                saveBtn.innerText = "내보내기"; 
                if (isFull) { diaryView.classList.remove('exporting'); }
            }).catch(err => {
                console.error("Export error:", err);
                saveBtn.innerText = "내보내기";
                if (isFull) { diaryView.classList.remove('exporting'); }
            });
        }

        document.getElementById('export-full-btn').onclick = () => performExport(diaryView, "diary_full", true);
        document.getElementById('export-photo-btn').onclick = () => performExport(document.getElementById('polaroid-target'), "photo_only", false);
    </script>
</body>
</html>
